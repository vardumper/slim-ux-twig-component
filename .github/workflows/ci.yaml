name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  installable-slim-require:
    name: PHP ${{ matrix.php }} installable (slim/slim=${{ matrix.slim-require }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.3", "8.4", "8.5"]
        slim-require: ["4.*"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Pin slim/slim version for this matrix job
        run: composer require --no-update "slim/slim:${{ matrix.slim-require }}"

      - name: Resolve dependencies
        run: composer update --no-interaction --no-progress --prefer-dist --no-scripts --with-all-dependencies

      - name: Show installed slim/slim version
        run: composer show slim/slim | sed -n '1,12p'