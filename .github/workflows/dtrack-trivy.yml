name: Workflow for Depency Track and Trivy
env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
on:
  push:
    paths:
      - .github/workflows/dtrack-trivy.yml
      - 'composer.json'
      - 'composer.lock'
  pull_request:
    paths:
      - .github/workflows/dtrack-trivy.yml
      - 'composer.json'
      - 'composer.lock'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: '0'
          token: ${{ github.token }}

      - name: Set up php 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install dependencies
        run: composer self-update && composer install && composer dump-autoload -o -a

      - name: Show that Composer Lockfile exists
        run: |
          ls -lart composer.lock

      - name: Install Trivy
        run: |
          TRIVY_VERSION=$(curl -sSfL https://api.github.com/repos/aquasecurity/trivy/releases/latest | jq -r .tag_name)
          echo "Installing ${TRIVY_VERSION}"
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin "${TRIVY_VERSION}"

      - name: Show Trivy version
        run: trivy --version
      - name: Create CycloneDX SBOM with Trivy
        run: trivy fs --skip-files vendor/rector/swiss-knife/vendor/composer/installed.json,vendor/symplify/easy-coding-standard/vendor/composer/installed.json --format cyclonedx --include-dev-deps --output sbom.json --severity HIGH,CRITICAL,MEDIUM --scanners vuln,license,secret --exit-code 0 ./

      - name: Commit SBOM if changed
        run: |
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            git add sbom.json
            if git diff --cached --quiet; then
              echo "No sbom.json changes to commit"
              exit 0
            fi
            git commit -m "chore: update sbom.json" --no-verify
            git push origin HEAD:${BRANCH_NAME}
        continue-on-error: false

      - name: Push SBOM to Dependency Track
        run: |
          curl -L -X "POST" "${{ secrets.DTRACK_API_URL }}" \
           -H 'Content-Type: multipart/form-data' \
           -H "X-Api-Key: ${{ secrets.DTRACK_API_KEY }}" \
           -F "project=${{ secrets.DTRACK_PROJECT_UID }}" \
           -F "bom=@sbom.json"
